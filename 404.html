<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f7d8d0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:380px;
            background:#fff;
            border-radius:25px;
            padding:40px 30px;
            text-align:center;
            box-shadow:0 15px 30px rgba(0,0,0,.15);
            border:3px solid #f6b6a6;
        }

        .paw{
            font-size:55px;
        }

        h1{
            font-size:80px;
            color:#ef6b57;
            margin:10px 0;
        }

        h2{
            color:#444;
            margin-bottom:20px;
        }

        p{
            color:#666;
            line-height:1.6;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:15px 30px;
            background:#ef6b57;
            color:white;
            text-decoration:none;
            border-radius:50px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#d9533f;
            transform:translateY(-3px);
        }

        .footer{
            margin-top:25px;
            color:#ef6b57;
            font-size:18px;
        }
    </style>
</head>
<body>

    <div class="card">

        <div class="paw">🐾</div>

        <h1>404</h1>

        <h2>¡Ooopss! Página no encontrada</h2>

        <p>
            🌿 Esta página se perdió en el bosque de bambú.
            <br>
            Puede que haya sido movida o eliminada.
        </p>

        <a href="/" class="btn">🏠 Volver al inicio</a>

        <div class="footer">
            🐾 🐾 🐾
        </div>

    </div>

</body>
</html>
